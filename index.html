<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>

  <script>
    // Ambil path + query + hash
    const path = window.location.pathname;
    const query = window.location.search;
    const hash = window.location.hash;

    // Domain tujuan
    const targetDomain = "https://website2.net";

    // Redirect
    window.location.replace(targetDomain + path + query + hash);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
